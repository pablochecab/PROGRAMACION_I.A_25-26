<body>
    <script>
        function isPrimo(numero) {    
            for(let i = 2; i < numero; i++) {
                if(numero % i === 0) {
                    return false;
                } else {
                    return true;
                }
            }
        }
        console.log(isPrimo(19))
    </script>
</body>
